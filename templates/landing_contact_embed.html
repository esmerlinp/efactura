<!DOCTYPE html>
<html lang="es-DO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'DM Sans', sans-serif;
        }

        body {
            margin: 0;
            background: transparent;
            color: #e5e7eb;
        }

        .card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .title {
            font-family: 'Sora', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 18px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #f9fafb;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: #0a0e1a;
        }

        .success {
            display: none;
            text-align: center;
        }

        .success h4 {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            margin: 12px 0 6px;
        }

        .success p {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .success .icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #34d399;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="contact-form">
            <div class="title">Solicita tu demo</div>
            <div class="subtitle">Te contactamos en menos de 24 horas laborables.</div>
            <form id="embed-lead-form">
                <input type="hidden" name="volumen_facturas" value="100">
                <div class="field">
                    <label for="embed-name">Nombre completo *</label>
                    <input id="embed-name" name="name" type="text" placeholder="Nombre y apellido" required>
                </div>
                <div class="field">
                    <label for="embed-email">Correo corporativo *</label>
                    <input id="embed-email" name="email" type="email" placeholder="tu@empresa.com" required>
                </div>
                <div class="field">
                    <label for="embed-phone">Teléfono *</label>
                    <input id="embed-phone" name="phone" type="tel" placeholder="809-555-0199" required>
                </div>
                <div class="field">
                    <label for="embed-rnc">RNC (opcional)</label>
                    <input id="embed-rnc" name="rnc" type="text" placeholder="131689787">
                </div>
                <div class="field">
                    <label for="embed-transactions">Transacciones mensuales *</label>
                    <select id="embed-transactions" name="transactions_qty" required>
                        <option value="" disabled selected>Selecciona un rango</option>
                        <option value="Menos de 50">Menos de 50</option>
                        <option value="50 a 200">50 a 200</option>
                        <option value="200 a 500">200 a 500</option>
                        <option value="500 a 1,500">500 a 1,500</option>
                        <option value="Más de 1,500">Más de 1,500</option>
                    </select>
                </div>
                <div class="field">
                    <label for="embed-comments">Comentarios</label>
                    <textarea id="embed-comments" name="comments" placeholder="Cuéntanos sobre tu operación..."></textarea>
                </div>
                <button type="submit" class="btn">Solicitar Demo</button>
            </form>
        </div>

        <div id="contact-success" class="success">
            <div class="icon">✓</div>
            <h4>Solicitud enviada</h4>
            <p>Gracias por contactar a e-Factura. Un especialista te escribirá pronto.</p>
        </div>
    </div>

    <script>
        const leadForm = document.getElementById('embed-lead-form');
        const successState = document.getElementById('contact-success');
        const formState = document.getElementById('contact-form');

        if (leadForm) {
            leadForm.addEventListener('submit', function(event) {
                event.preventDefault();
                const formData = new FormData(leadForm);
                const payload = {};
                formData.forEach((value, key) => { payload[key] = value; });

                fetch('/api/solicitar-demo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(res => {
                    if (res.success) {
                        formState.style.display = 'none';
                        successState.style.display = 'block';
                    } else {
                        alert('Error al enviar la solicitud.');
                    }
                })
                .catch(() => {
                    formState.style.display = 'none';
                    successState.style.display = 'block';
                });
            });
        }
    </script>
</body>
</html>
