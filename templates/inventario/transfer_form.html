{% extends "layout.html" %}
{% block title %}Nueva Transferencia — {{ product_name }}{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title"><i class="fa-solid fa-truck-fast"></i> Nueva Transferencia</h1>
</div>

<div class="card">
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="card-body">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:16px;">
                <div class="form-group">
                    <label>Almacén Origen</label>
                    <select name="originWarehouseId" class="form-control" required>
                        <option value="">Seleccione...</option>
                        {% for w in warehouses %}
                        <option value="{{ w.id }}">{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Almacén Destino</label>
                    <select name="destinationWarehouseId" class="form-control" required>
                        <option value="">Seleccione...</option>
                        {% for w in warehouses %}
                        <option value="{{ w.id }}">{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <table class="table" style="font-size:0.88rem;">
                <thead><tr><th>Producto</th><th>Stock Total</th><th style="width:120px;">Cantidad</th></tr></thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.name }}</td>
                        <td>{{ "%.2f"|format(item.totalStock|float) }}</td>
                        <td><input type="number" step="0.01" name="qty_{{ item.id }}" class="form-control small" value="0" min="0"></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="form-group">
                <label>Notas</label>
                <input type="text" name="notes" class="form-control">
            </div>
        </div>
        <div class="card-footer" style="display:flex; gap:12px; justify-content: flex-end;">
            <a href="{{ url_for('web_inventory.transfer_list') }}" class="btn btn-ghost">Cancelar</a>
            <button type="submit" class="btn btn-accent">Solicitar Transferencia</button>
        </div>
    </form>
</div>
{% endblock %}
