{% extends "rrhh/layout_hr.html" %}
{% block title %}Posiciones — {{ product_name }}{% endblock %}
{% block content %}
{% include "rrhh/_styles.html" %}
<div class="page-header hr-page-header">
    <h1 class="page-title"><i class="fa-solid fa-briefcase"></i> Posiciones</h1>
    <a href="{{ url_for('web_rrhh.settings_index') }}" class="btn btn-ghost"><i class="fa-solid fa-arrow-left"></i> Configuración</a>
</div>
<div class="card-table-wrapper" style="padding:16px 24px; margin-bottom:16px; display:flex; gap:8px;">
    <form method="POST" action="{{ url_for('web_rrhh.position_save') }}" style="display:flex; gap:8px; flex:1; align-items:flex-end;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group" style="margin:0; flex:1;">
            <input type="text" name="name" class="form-input" placeholder="Nueva posición..." required>
        </div>
        <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-plus"></i> Agregar</button>
    </form>
</div>
<div class="card-table-wrapper hr-table-card">
    <div class="table-responsive">
        <table class="table-premium">
        <thead><tr><th>Nombre</th><th>Acción</th></tr></thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>
                    <form method="POST" action="{{ url_for('web_rrhh.position_save') }}" style="display:flex; gap:8px;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="id" value="{{ item.id }}">
                        <input type="text" name="name" value="{{ item.name }}" class="form-input" style="border:1px solid transparent; background:transparent;">
                        <button type="submit" class="btn btn-ghost btn-sm"><i class="fa-solid fa-check"></i></button>
                    </form>
                </td>
                <td>
                    <form method="POST" action="{{ url_for('web_rrhh.position_delete', item_id=item.id) }}"
                          onsubmit="return confirm('¿Eliminar {{ item.name }}?')" style="display:contents;">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn btn-ghost btn-sm" style="color:var(--danger);"><i class="fa-solid fa-trash-can"></i></button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="2" class="text-center text-muted">Sin posiciones definidas.</td></tr>
            {% endfor %}
        </tbody>
        </table>
    </div>
</div>
{% endblock %}
