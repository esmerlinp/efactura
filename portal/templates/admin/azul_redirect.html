<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionando a Azul...</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(59, 130, 246, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin: 0 auto 24px auto;
        }
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 600; }
        p { margin: 0; color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redireccionando a la pasarela Azul</h2>
        <p>Por favor espera un momento mientras te transferimos de forma segura para completar tu pago.</p>
    </div>

    <form id="azulForm" action="{{ payment.url }}" method="POST" style="display: none;">
        {% for name, value in payment.params.items() %}
        <input type="hidden" name="{{ name }}" value="{{ value }}">
        {% endfor %}
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('azulForm').submit();
        });
    </script>
</body>
</html>
